name: Go

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # taller-tad depende de data-structures via replace en go.mod
      # checkout como sibling para que la directiva funcione
      - uses: actions/checkout@v4
        with:
          repository: untref-ayp2/data-structures
          path: ../data-structures

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
